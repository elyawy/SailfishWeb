<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sailfish</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <div id="topbar">
    <h1>Sailfish</h1>
    <div id="status-dot" title="Loading WASM…"></div>
    <input id="newick-input" placeholder="Paste Newick string…"
      value="((Human:0.1,Chimp:0.15):0.2,(Mouse:0.3,Rat:0.25):0.2);" />
    <button class="btn" id="parse-btn" disabled>Parse</button>
    <label style="font-size:11px;color:#aaa;white-space:nowrap">Runs</label>
    <input type="number" id="n-runs" value="1" min="1" max="10000"
      style="width:56px;font-family:monospace;font-size:12px;padding:4px 6px;border:1px solid #e0e0e0;border-radius:4px;background:#fafafa"/>
    <button class="btn btn-run" id="run-btn" disabled>Run ▶</button>
  </div>

  <div id="workspace">

    <div id="canvas-wrap">
      <canvas id="tree-canvas"></canvas>
      <div id="no-tree-msg">Parse a Newick string to begin</div>
      <div id="canvas-hint">scroll to zoom · drag to pan · click node to select</div>
      <div id="canvas-legend">
        <span>● override &nbsp; ○ inherited</span>
      </div>
    </div>

    <div id="panel">
      <div id="panel-placeholder">Click a node<br>to edit its model</div>
      <div id="panel-content"></div>
    </div>

  </div>

  <div id="output-panel">
    <div id="out-header">
      <span id="out-label">Output</span>
      <button class="btn" id="dl-btn">↓ Download</button>
      <button class="btn" id="out-close">✕</button>
    </div>
    <div id="out-body"></div>
  </div>

</div>
<script type="module" src="main.js"></script>
</body>
</html>
